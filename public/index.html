    // ===== SOLO MODE ENGINE =====
    let soloSnake = [];
    let soloDir = { x: 1, y: 0 };
    let soloNextDir = { x: 1, y: 0 };
    let soloScore = 0;
    let soloAlive = true;
    let soloTimerVal = 120;
    let soloMaxTime = 120;
    let soloTickId = null;
    let soloTimerId = null;
    let soloSpawnId = null;
    let soloFoods = [];
    let soloPowerups = [];
    let soloBuffs = { double: 0, speedUp: 0, speedDown: 0, magnet: 0, reverse: 0, invincible: 0 };
    let soloStarted = false;
    let soloTickAccum = 0;
    const SOLO_LENGTH_SPEED_FACTOR = 0.04;
    const SOLO_MAX_LENGTH_SPEED = 2.5;

    function updateSoloSetup() {
      const sw = document.getElementById('soloWrapSwitch');
      const wl = document.getElementById('soloWrapLabel');
      if (soloWrapMode) { sw.classList.add('on'); wl.textContent = '穿墙通行'; wl.style.color = '#00ffcc'; }
      else { sw.classList.remove('on'); wl.textContent = '撞墙即死'; wl.style.color = '#555'; }
    }

    function startSoloMode() {
      initAudio();
      startMusic();
      isSoloMode = true;
      soloWrapMode = false;
      updateSoloSetup();
      showScreen('soloScreen');
    }

    function launchSolo() {
      myName = document.getElementById('nameInput').value.trim() || 'Player';
      soloMaxTime = parseInt(document.getElementById('soloTimerSelect').value);
      gameWrapMode = soloWrapMode;
      initSoloGame();
      showCountdown(3);
      setMusicState('countdown');
      playCountdownBeep(false);
      let cd = 2;
      const cdInt = setInterval(() => {
        if (cd > 0) { showCountdown(cd); playCountdownBeep(cd === 1); cd--; }
        else { clearInterval(cdInt); document.getElementById('countdownOverlay').classList.remove('show'); startSoloGame(); }
      }, 1000);
    }

    function initSoloGame() {
      const mid = Math.floor(GRID / 2);
      soloSnake = [{ x: 5, y: mid }, { x: 4, y: mid }, { x: 3, y: mid }];
      soloDir = { x: 1, y: 0 };
      soloNextDir = { x: 1, y: 0 };
      soloScore = 0;
      soloAlive = true;
      soloTimerVal = soloMaxTime;
      soloFoods = [];
      soloPowerups = [];
      soloBuffs = { double: 0, speedUp: 0, speedDown: 0, magnet: 0, reverse: 0, invincible: 0 };
      soloTickAccum = 0;
      for (let i = 0; i < 2; i++) spawnSoloFood();
      gameSnakes = [{ id: 'solo', name: myName, color: '#00ffcc', snake: [...soloSnake], direction: soloDir, score: 0, alive: true, buffs: { ...soloBuffs } }];
      gameFoods = soloFoods;
      gamePowerups = soloPowerups;
      gameTimer = soloMaxTime;
    }

    function spawnSoloFood() {
      let attempts = 0;
      while (attempts < 200) {
        const x = Math.floor(Math.random() * GRID);
        const y = Math.floor(Math.random() * GRID);
        const occ = soloSnake.some(s => s.x === x && s.y === y) || soloFoods.some(f => f.x === x && f.y === y) || soloPowerups.some(p => p.x === x && p.y === y);
        if (!occ) { soloFoods.push({ x, y, id: Math.random().toString(36).slice(2, 6) }); return; }
        attempts++;
      }
      soloFoods.push({ x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID), id: Math.random().toString(36).slice(2, 6) });
    }

    function spawnSoloPowerup() {
      if (soloPowerups.length >= 3) return;
      let attempts = 0;
      while (attempts < 200) {
        const x = Math.floor(Math.random() * GRID);
        const y = Math.floor(Math.random() * GRID);
        const occ = soloSnake.some(s => s.x === x && s.y === y) || soloFoods.some(f => f.x === x && f.y === y) || soloPowerups.some(p => p.x === x && p.y === y);
        if (!occ) {
          const types = ['double', 'speedUp', 'speedDown', 'magnet', 'reverse', 'invincible'];
          const weights = [25, 15, 15, 15, 15, 15];
          const total = weights.reduce((s, w) => s + w, 0);
          let r = Math.random() * total;
          let type = types[0];
          for (let i = 0; i < types.length; i++) { r -= weights[i]; if (r <= 0) { type = types[i]; break; } }
          soloPowerups.push({ x, y, type, id: Math.random().toString(36).slice(2, 6), ttl: 150 });
          return;
        }
        attempts++;
      }
    }

    function soloMagnetPull() {
      if (soloBuffs.magnet <= 0) return;
      const head = soloSnake[0];
      const range = 5;
      for (let i = soloFoods.length - 1; i >= 0; i--) {
        const f = soloFoods[i];
        const dx = f.x - head.x;
        const dy = f.y - head.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist <= range && dist > 0) {
          f.x += head.x > f.x ? 1 : head.x < f.x ? -1 : 0;
          f.y += head.y > f.y ? 1 : head.y < f.y ? -1 : 0;
        }
      }
    }

    function soloTick() {
      if (!soloAlive) return;

      // Expire powerups
      for (let i = soloPowerups.length - 1; i >= 0; i--) {
        soloPowerups[i].ttl--;
        if (soloPowerups[i].ttl <= 0) soloPowerups.splice(i, 1);
      }

      // Decrement buffs
      for (const k in soloBuffs) { if (soloBuffs[k] > 0) soloBuffs[k]--; }

      // Magnet
      soloMagnetPull();

      // Speed tick control
      let mult = 1;
      if (soloBuffs.speedUp > 0) mult *= 1.8;
      if (soloBuffs.speedDown > 0) mult *= 0.5;
      const lengthBonus = 1 + Math.max(0, soloSnake.length - 3) * SOLO_LENGTH_SPEED_FACTOR;
      mult *= Math.min(lengthBonus, SOLO_MAX_LENGTH_SPEED);
      soloTickAccum += mult;
      if (soloTickAccum < 1) { syncSoloState(); return; }
      soloTickAccum -= 1;

      soloDir = { ...soloNextDir };
      const head = { x: soloSnake[0].x + soloDir.x, y: soloSnake[0].y + soloDir.y };

      if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
        if (gameWrapMode) { head.x = (head.x + GRID) % GRID; head.y = (head.y + GRID) % GRID; }
        else if (soloBuffs.invincible > 0) { soloNextDir = { x: -soloDir.x, y: -soloDir.y }; return; }
        else { soloAlive = false; playDeathSFX(); endSoloGame(); return; }
      }

      if (soloSnake.some(s => s.x === head.x && s.y === head.y)) {
        if (soloBuffs.invincible > 0) return;
        soloAlive = false; playDeathSFX(); endSoloGame(); return;
      }

      soloSnake.unshift(head);

      let ate = false;
      const fi = soloFoods.findIndex(f => f.x === head.x && f.y === head.y);
      if (fi !== -1) {
        const gain = soloBuffs.double > 0 ? 20 : 10;
        soloScore += gain;
        soloFoods.splice(fi, 1);
        spawnSoloFood();
        playEatSFX();
        ate = true;
      }

      // Magnet: also eat food pulled to old head position
      if (!ate && soloBuffs.magnet > 0 && soloSnake.length > 1) {
        const oldHead = soloSnake[1];
        const magnetIdx = soloFoods.findIndex(f => f.x === oldHead.x && f.y === oldHead.y);
        if (magnetIdx !== -1) {
          const gain = soloBuffs.double > 0 ? 20 : 10;
          soloScore += gain;
          soloFoods.splice(magnetIdx, 1);
          spawnSoloFood();
          playEatSFX();
          ate = true;
        }
      }

      if (!ate) {
        soloSnake.pop();
      }

      const puIdx = soloPowerups.findIndex(pu => pu.x === head.x && pu.y === head.y);
      if (puIdx !== -1) {
        const pu = soloPowerups[puIdx];
        applySoloPowerup(pu.type);
        soloPowerups.splice(puIdx, 1);
      }

      syncSoloState();
    }

    function applySoloPowerup(type) {
      switch (type) {
        case 'double': soloBuffs.double = 150; break;
        case 'speedUp': soloBuffs.speedUp = 150; break;
        case 'speedDown': soloBuffs.speedDown = 150; break;
        case 'magnet': soloBuffs.magnet = 150; break;
        case 'reverse':
          soloBuffs.reverse = 150;
          soloNextDir = { x: -soloNextDir.x, y: -soloNextDir.y };
          break;
        case 'invincible': soloBuffs.invincible = 150; break;
      }
    }

    function syncSoloState() {
      gameSnakes = [{ id: 'solo', name: myName, color: '#00ffcc', snake: [...soloSnake], direction: { ...soloDir }, score: soloScore, alive: soloAlive, buffs: { ...soloBuffs } }];
      gameFoods = soloFoods;
      gamePowerups = soloPowerups;
      updateHud();
    }

    function soloTimerTick() {
      if (!soloAlive || soloMaxTime === 0) return;
      soloTimerVal--;
      gameTimer = soloTimerVal;
      if (soloTimerVal <= 0) { soloTimerVal = 0; gameTimer = 0; endSoloGame(); }
      if (soloTimerVal <= 10) setMusicState('urgent');
    }

    function startSoloGame() {
      showScreen('gameScreen');
      setMusicState('playing');
      soloStarted = true;
      soloTickId = setInterval(soloTick, 100);
      if (soloMaxTime > 0) soloTimerId = setInterval(soloTimerTick, 1000);
      soloSpawnId = setInterval(spawnSoloPowerup, 8000);
      updateHud();
    }

    function stopSoloLoop() {
      if (soloTickId) { clearInterval(soloTickId); soloTickId = null; }
      if (soloTimerId) { clearInterval(soloTimerId); soloTimerId = null; }
      if (soloSpawnId) { clearInterval(soloSpawnId); soloSpawnId = null; }
      soloStarted = false;
    }

    function endSoloGame() {
      stopSoloLoop();
      setMusicState('result');
      if (audioCtx) playFanfare(audioCtx.currentTime);
      showScreen('resultScreen');
      renderResult([{ name: myName, color: getSnakeColor(), score: soloScore, alive: soloAlive }]);
    }

    function requestRematch() {
      if (isSoloMode) {
        initSoloGame();
        launchSolo();
        return;
      }
      if (!ws) return;
      if (rematchRequested) return;
      rematchRequested = true;
      document.getElementById('rematchBtn').textContent = '等待其他玩家...';
      document.getElementById('rematchBtn').disabled = true;
      ws.send(JSON.stringify({ type: 'rematch' }));
    }

    // --- Start render loop ---
    drawGame();

    // ===== MUSIC ENGINE (Web Audio API) =====
    let audioCtx = null;
    let masterGain = null;
    let musicMuted = false;
    let musicState = 'lobby'; // lobby | countdown | playing | urgent | result
    let musicScheduler = null;
    let nextNoteTime = 0;
    let currentBeat = 0;
    let currentBar = 0;
    const BPM_BASE = 128;
    let currentBPM = BPM_BASE;

    // Scales & patterns
    const BASS_NOTES = {
      lobby:    [55, 55, 65.41, 65.41, 73.42, 73.42, 65.41, 55],
      countdown:[55, 58.27, 61.74, 65.41, 61.74, 58.27, 55, 55],
      playing:  [55, 55, 73.42, 73.42, 82.41, 82.41, 73.42, 55],
      urgent:   [55, 82.41, 55, 82.41, 55, 82.41, 55, 82.41],
      result:   [55, 65.41, 73.42, 82.41, 82.41, 73.42, 65.41, 55],
    };
    const ARP_NOTES = {
      lobby:    [220, 261.63, 329.63, 261.63],
      countdown:[220, 261.63, 329.63, 392, 329.63, 261.63, 220, 329.63],
      playing:  [220, 261.63, 329.63, 392, 440, 392, 329.63, 261.63],
      urgent:   [220, 329.63, 440, 523.25, 440, 329.63, 220, 440],
      result:   [220, 329.63, 392, 523.25, 523.25, 392, 329.63, 220],
    };

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.35;
      masterGain.connect(audioCtx.destination);
    }

    function toggleMusic() {
      musicMuted = !musicMuted;
      const btn = document.getElementById('musicToggle');
      btn.textContent = musicMuted ? '🔇' : '🔊';
      btn.classList.toggle('muted', musicMuted);
      if (masterGain) masterGain.gain.value = musicMuted ? 0 : 0.35;
    }

    function setMusicState(state) {
      if (musicState === state) return;
      musicState = state;
      if (state === 'urgent') currentBPM = 150;
      else if (state === 'playing') currentBPM = 128;
      else if (state === 'countdown') currentBPM = 140;
      else currentBPM = BPM_BASE;
    }

    // Kick drum
    function playKick(time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, time);
      osc.frequency.exponentialRampToValueAtTime(30, time + 0.12);
      gain.gain.setValueAtTime(0.8, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
      osc.connect(gain); gain.connect(masterGain);
      osc.start(time); osc.stop(time + 0.2);
    }

    // Snare
    function playSnare(time) {
      const noise = audioCtx.createBufferSource();
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.6;
      noise.buffer = buf;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.5, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass'; filter.frequency.value = 1000;
      noise.connect(filter); filter.connect(gain); gain.connect(masterGain);
      noise.start(time); noise.stop(time + 0.1);

      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, time);
      osc.frequency.exponentialRampToValueAtTime(80, time + 0.05);
      oscGain.gain.setValueAtTime(0.4, time);
      oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
      osc.connect(oscGain); oscGain.connect(masterGain);
      osc.start(time); osc.stop(time + 0.08);
    }

    // Hi-hat
    function playHihat(time, open) {
      const noise = audioCtx.createBufferSource();
      const len = open ? 0.08 : 0.03;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * len, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
      noise.buffer = buf;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(open ? 0.2 : 0.12, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + len);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass'; filter.frequency.value = 5000;
      noise.connect(filter); filter.connect(gain); gain.connect(masterGain);
      noise.start(time); noise.stop(time + len);
    }

    // Bass synth
    function playBass(time, freq, dur) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, time);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(400, time);
      filter.frequency.exponentialRampToValueAtTime(120, time + dur * 0.8);
      gain.gain.setValueAtTime(0.35, time);
      gain.gain.setValueAtTime(0.35, time + dur * 0.6);
      gain.gain.exponentialRampToValueAtTime(0.01, time + dur);
      osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
      osc.start(time); osc.stop(time + dur);
    }

    // Lead/arp synth
    function playArp(time, freq, dur) {
      const osc = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc2.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, time);
      osc2.frequency.setValueAtTime(freq * 1.005, time);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(2000, time);
      filter.frequency.exponentialRampToValueAtTime(600, time + dur);
      gain.gain.setValueAtTime(0, time);
      gain.gain.linearRampToValueAtTime(0.15, time + 0.01);
      gain.gain.setValueAtTime(0.15, time + dur * 0.5);
      gain.gain.exponentialRampToValueAtTime(0.01, time + dur);
      osc.connect(filter); osc2.connect(filter);
      filter.connect(gain); gain.connect(masterGain);
      osc.start(time); osc.stop(time + dur);
      osc2.start(time); osc2.stop(time + dur);
    }

    // FX: sweep for countdown
    function playSweep(time, up) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      if (up) {
        osc.frequency.setValueAtTime(200, time);
        osc.frequency.exponentialRampToValueAtTime(1200, time + 0.8);
      } else {
        osc.frequency.setValueAtTime(1200, time);
        osc.frequency.exponentialRampToValueAtTime(200, time + 0.4);
      }
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass'; filter.frequency.value = 800; filter.Q.value = 5;
      gain.gain.setValueAtTime(0.15, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.8);
      osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
      osc.start(time); osc.stop(time + 0.8);
    }

    // Result fanfare
    function playFanfare(time) {
      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((freq, i) => {
        const t = time + i * 0.12;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass'; filter.frequency.value = 3000;
        osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
        osc.start(t); osc.stop(t + 0.4);
      });
    }

    // Eat food SFX
    function playEatSFX() {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
      osc.connect(gain); gain.connect(masterGain);
      osc.start(t); osc.stop(t + 0.12);
    }

    // Death SFX
    function playDeathSFX() {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, t);
      osc.frequency.exponentialRampToValueAtTime(50, t + 0.5);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 800;
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
      osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
      osc.start(t); osc.stop(t + 0.5);
    }

    // Countdown beep
    function playCountdownBeep(last) {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = last ? 880 : 440;
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + (last ? 0.5 : 0.15));
      osc.connect(gain); gain.connect(masterGain);
      osc.start(t); osc.stop(t + (last ? 0.5 : 0.15));
    }

    // --- Beat scheduler ---
    function scheduleBeat() {
      if (!audioCtx) return;
      const secPerBeat = 60 / currentBPM;
      const secPer16th = secPerBeat / 4;

      while (nextNoteTime < audioCtx.currentTime + 0.1) {
        const beatInBar = currentBeat % 16; // 16 sixteenth notes per bar
        const barNum = Math.floor(currentBeat / 16);

        const bassPattern = BASS_NOTES[musicState] || BASS_NOTES.lobby;
        const arpPattern = ARP_NOTES[musicState] || ARP_NOTES.lobby;

        // Kick: beats 0, 4, 8, 12 (four-on-the-floor for playing, half for lobby)
        if (musicState === 'playing' || musicState === 'urgent') {
          if (beatInBar % 4 === 0) playKick(nextNoteTime);
        } else if (musicState === 'countdown') {
          if (beatInBar === 0 || beatInBar === 8) playKick(nextNoteTime);
        } else {
          if (beatInBar === 0) playKick(nextNoteTime);
        }

        // Snare: beats 4, 12 for playing; 8 for lobby
        if (musicState === 'playing' || musicState === 'urgent') {
          if (beatInBar === 4 || beatInBar === 12) playSnare(nextNoteTime);
        } else if (musicState === 'countdown') {
          if (beatInBar === 4 || beatInBar === 12) playSnare(nextNoteTime);
        } else if (musicState === 'result') {
          if (beatInBar === 0) playSnare(nextNoteTime);
        }

        // Hi-hat
        if (musicState === 'playing' || musicState === 'urgent') {
          if (beatInBar % 2 === 0) playHihat(nextNoteTime, beatInBar % 4 === 2);
        } else if (musicState === 'countdown') {
          if (beatInBar % 2 === 0) playHihat(nextNoteTime, false);
        }

        // Bass: on beat 0 and 8 for lobby; every 4 sixteenths for playing
        if (musicState === 'lobby' || musicState === 'result') {
          if (beatInBar === 0) {
            const bassIdx = barNum % bassPattern.length;
            playBass(nextNoteTime, bassPattern[bassIdx], secPerBeat * 2);
          }
        } else if (musicState === 'countdown') {
          if (beatInBar % 4 === 0) {
            const bassIdx = (barNum * 4 + beatInBar / 4) % bassPattern.length;
            playBass(nextNoteTime, bassPattern[bassIdx], secPerBeat);
          }
        } else {
          if (beatInBar % 4 === 0) {
            const bassIdx = (barNum * 4 + beatInBar / 4) % bassPattern.length;
            playBass(nextNoteTime, bassPattern[bassIdx], secPerBeat * 0.8);
          }
        }

        // Arp: faster during playing
        if (musicState === 'playing' || musicState === 'urgent') {
          if (beatInBar % 2 === 0) {
            const arpIdx = (barNum * 8 + beatInBar / 2) % arpPattern.length;
            playArp(nextNoteTime, arpPattern[arpIdx], secPer16th * 1.8);
          }
        } else if (musicState === 'countdown') {
          if (beatInBar % 4 === 0) {
            const arpIdx = (barNum * 4 + beatInBar / 4) % arpPattern.length;
            playArp(nextNoteTime, arpPattern[arpIdx], secPerBeat * 0.8);
          }
        } else if (musicState === 'result') {
          if (beatInBar === 0) {
            const arpIdx = barNum % arpPattern.length;
            playArp(nextNoteTime, arpPattern[arpIdx], secPerBeat * 2);
          }
        }

        // Sweep FX on countdown bar boundaries
        if (musicState === 'countdown' && beatInBar === 0 && barNum % 2 === 0) {
          playSweep(nextNoteTime, true);
        }

        // Urgent alarm: extra hits on offbeats
        if (musicState === 'urgent' && beatInBar % 4 === 2) {
          playKick(nextNoteTime);
        }

        nextNoteTime += secPer16th;
        currentBeat++;
      }
    }

    function startMusic() {
      initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      nextNoteTime = audioCtx.currentTime;
      currentBeat = 0;
      if (musicScheduler) clearInterval(musicScheduler);
      musicScheduler = setInterval(scheduleBeat, 25);
    }

    function stopMusic() {
      if (musicScheduler) { clearInterval(musicScheduler); musicScheduler = null; }
    }

    // --- Integrate music with game state ---
    const origHandleMessage = handleMessage;
    handleMessage = function(msg) {
      origHandleMessage(msg);

      // Start music scheduler on first lobby/welcome
      if (!musicScheduler && (msg.type === 'welcome' || msg.type === 'lobby')) {
        startMusic();
      }

      if (msg.type === 'countdown') {
        setMusicState('countdown');
        playCountdownBeep(msg.value === 1);
        if (msg.value === 1) playSweep(audioCtx ? audioCtx.currentTime : 0, true);
      }

      if (msg.type === 'state') {
        const meAlive = msg.snakes.some(s => s.id === myId && s.alive);
        if (msg.timer <= 10) setMusicState('urgent');
        else if (meAlive) setMusicState('playing');
        else setMusicState('lobby');
      }

      if (msg.type === 'result') {
        setMusicState('result');
        if (audioCtx) playFanfare(audioCtx.currentTime);
      }
    };

    // Override connect to init audio on click
    const origDoConnect = doConnect;
    doConnect = function() {
      initAudio();
      origDoConnect();
    };

    // Track score changes for eat SFX
    let prevScore = 0;
    const origUpdateHud = updateHud;
    updateHud = function() {
      const me = gameSnakes.find(s => s.id === myId);
      if (me && me.score > prevScore) {
        playEatSFX();
        prevScore = me.score;
      }
      if (me && !me.alive && prevScore >= 0) {
        // Check if just died this frame
      }
      origUpdateHud();
    };

    // Detect death
    let wasAlive = true;
    setInterval(() => {
      const me = gameSnakes.find(s => s.id === myId);
      if (me && !me.alive && wasAlive) {
        playDeathSFX();
        wasAlive = false;
      }
      if (me && me.alive) wasAlive = true;
    }, 200);

    // ===== AD MONETIZATION SYSTEM =====
    const AdManager = {
      _resolve: null,
      _timer: null,
      _seconds: 0,
      AD_DURATION: 5,
      INTERSTITIAL_DELAY: 1500,

      showRewarded() {
        return new Promise(resolve => {
          this._resolve = resolve;
          const overlay = document.getElementById('adOverlay');
          const num = document.getElementById('adCountdownNum');
          const skipBtn = document.getElementById('adSkipBtn');
          const circle = document.getElementById('adProgressCircle');
          const fakeContent = document.getElementById('adFakeContent');
          const fakeItems = ['🎮','🚀','💎','🌟','🎯','📱','🏆','⚡'];
          fakeContent.textContent = fakeItems[Math.floor(Math.random()*fakeItems.length)];

          overlay.classList.add('show');
          this._seconds = this.AD_DURATION;
          num.textContent = this._seconds;
          skipBtn.classList.remove('ready');
          skipBtn.textContent = `${this._seconds}s 后可跳过`;
          circle.style.strokeDashoffset = '0';
          const totalDash = 150.8;

          this._timer = setInterval(() => {
            this._seconds--;
            num.textContent = Math.max(0, this._seconds);
            circle.style.strokeDashoffset = (totalDash * (1 - this._seconds / this.AD_DURATION)).toString();

            if (this._seconds <= 0) {
              clearInterval(this._timer);
              skipBtn.classList.add('ready');
              skipBtn.textContent = '✓ 领取奖励';
            } else {
              skipBtn.textContent = `${this._seconds}s 后可跳过`;
            }
          }, 1000);
        });
      },

      skipAd() {
        if (this._seconds > 0) return;
        const overlay = document.getElementById('adOverlay');
        overlay.classList.remove('show');
        clearInterval(this._timer);
        if (this._resolve) { this._resolve(true); this._resolve = null; }
      },

      showInterstitial() {
        return new Promise(resolve => {
          const overlay = document.getElementById('interstitialOverlay');
          overlay.classList.add('show');
          setTimeout(() => {
            document.getElementById('interstitialSkipBtn').style.display = 'inline-block';
          }, this.INTERSTITIAL_DELAY);
          this._interstitialResolve = resolve;
        });
      },

      closeInterstitial() {
        const overlay = document.getElementById('interstitialOverlay');
        overlay.classList.remove('show');
        if (this._interstitialResolve) { this._interstitialResolve(); this._interstitialResolve = null; }
      }
    };

    // ===== SHOP / SKIN SYSTEM =====
    const SKINS = [
      { id: 'default',  name: '默认',   colors: ['#00ffcc','#7b68ee'], cost: 0, unlocked: true },
      { id: 'sunset',   name: '落日',   colors: ['#ff6ec4','#ff9a3c'], cost: 1, unlocked: false },
      { id: 'gold',     name: '黄金',   colors: ['#ffd700','#ffaa00'], cost: 1, unlocked: false },
      { id: 'ice',      name: '冰霜',   colors: ['#88ddff','#4488ff'], cost: 1, unlocked: false },
      { id: 'neon',     name: '霓虹',   colors: ['#ff00ff','#00ffff'], cost: 2, unlocked: false },
      { id: 'fire',     name: '烈焰',   colors: ['#ff4400','#ffcc00'], cost: 2, unlocked: false },
      { id: 'phantom',  name: '幻影',   colors: ['#8844ff','#44aaff'], cost: 3, unlocked: false },
      { id: 'rainbow',  name: '彩虹',   colors: ['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#8800ff'], cost: 3, unlocked: false },
    ];

    let currentSkin = 'default';

    function loadSkins() {
      const data = localStorage.getItem('snakeSkins');
      if (data) {
        const parsed = JSON.parse(data);
        parsed.unlocked.forEach(id => {
          const skin = SKINS.find(s => s.id === id);
          if (skin) skin.unlocked = true;
        });
        currentSkin = parsed.current || 'default';
      }
    }

    function saveSkins() {
      localStorage.setItem('snakeSkins', JSON.stringify({
        unlocked: SKINS.filter(s => s.unlocked).map(s => s.id),
        current: currentSkin,
      }));
    }

    function getSnakeColor() {
      const skin = SKINS.find(s => s.id === currentSkin);
      return skin ? skin.colors[0] : '#00ffcc';
    }

    function renderShop() {
      const grid = document.getElementById('skinGrid');
      const unlocked = SKINS.filter(s => s.unlocked).length;
      document.getElementById('shopUnlockCount').textContent = unlocked;
      document.getElementById('shopTotalCount').textContent = SKINS.length;

      grid.innerHTML = SKINS.map(s => {
        const selected = s.id === currentSkin;
        const locked = !s.unlocked;
        const gradient = s.colors.length > 1
          ? `linear-gradient(135deg, ${s.colors.join(', ')})`
          : s.colors[0];
        return `<div class="skin-item${selected ? ' selected' : ''}${locked ? ' locked' : ''}" onclick="selectSkin('${s.id}')">
          ${selected ? '<span class="skin-check">✓</span>' : ''}
          ${locked ? '<span class="skin-lock-badge">🔒</span>' : ''}
          <div class="skin-preview" style="background:${gradient};"></div>
          <div class="skin-name">${s.name}</div>
          <div class="skin-cost${locked ? '' : ' unlocked'}">
            ${locked ? '🎬 看广告×' + s.cost : '已解锁'}
          </div>
        </div>`;
      }).join('');
    }

    async function selectSkin(id) {
      const skin = SKINS.find(s => s.id === id);
      if (!skin) return;

      if (skin.unlocked) {
        currentSkin = skin.id;
        myColor = getSnakeColor();
        saveSkins();
        renderShop();
        return;
      }

      // Unlock via ads
      let adsNeeded = skin.cost;
      for (let i = 0; i < adsNeeded; i++) {
        const watched = await AdManager.showRewarded();
        if (!watched) return;
      }
      skin.unlocked = true;
      currentSkin = skin.id;
      myColor = getSnakeColor();
      saveSkins();
      renderShop();
    }

    loadSkins();
    myColor = getSnakeColor();

    // ===== REVIVE SYSTEM =====
    let soloReviveUsed = false;
    let soloReviveAvailable = false;

    function showReviveDialog() {
      if (soloReviveUsed || !isSoloMode) {
        endSoloGame();
        return;
      }
      soloReviveAvailable = true;
      stopSoloLoop();
      document.getElementById('reviveDialog').classList.add('show');
    }

    async function watchAdForRevive() {
      document.getElementById('reviveDialog').classList.remove('show');
      soloReviveAvailable = false;
      const watched = await AdManager.showRewarded();
      if (!watched) { endSoloGame(); return; }
      // Revive: keep score and length, continue playing
      soloAlive = true;
      soloReviveUsed = true;
      // Give brief invincibility
      soloBuffs.invincible = 30; // 3 seconds
      syncSoloState();
      // Resume game
      if (!soloTickId) {
        soloTickId = setInterval(soloTick, 100);
        if (soloMaxTime > 0 && !soloTimerId) soloTimerId = setInterval(soloTimerTick, 1000);
      }
    }

    function skipRevive() {
      document.getElementById('reviveDialog').classList.remove('show');
      soloReviveAvailable = false;
      endSoloGame();
    }

    // ===== PRE-GAME BUFF =====
    let soloPreBuff = null;

    async function watchAdForBuff() {
      const watched = await AdManager.showRewarded();
      if (!watched) return;
      const buffs = ['double', 'magnet', 'speedDown'];
      const labels = ['双倍积分 15s', '吸铁石 15s', '减速 15s'];

    // ===== SCORE MULTIPLIER =====
    let scoreMultiplierUsed = false;

    async function watchAdForMultiplier() {

    // ===== OVERRIDE GAME FLOW FOR ADS =====

    // Override endSoloGame to show revive dialog first
    const _origEndSoloGame = endSoloGame;
    endSoloGame = function() {
      if (soloReviveAvailable) return; // dialog already showing
      if (!soloReviveUsed && isSoloMode && soloScore > 0) {
        showReviveDialog();
        return;
      }
      _origEndSoloGame();
      // Show score multiplier option on result
      if (!scoreMultiplierUsed && soloScore > 0) {
        document.getElementById('resultRewards').style.display = 'flex';
      }
    };

    // Override launchSolo to apply pre-game buff and reset revive state
    const _origLaunchSolo = launchSolo;
    launchSolo = function() {
      soloReviveUsed = false;
      soloReviveAvailable = false;
      scoreMultiplierUsed = false;
      soloPreBuff = null;
      // Reset buff button UI
      const btns = document.querySelectorAll('#soloScreen .reward-row .reward-option');
      if (btns[0]) {
        btns[0].innerHTML = '<span class="icon">🎬</span> 看广告领开局Buff';
        btns[0].style.borderColor = '';
        btns[0].style.color = '';
      }
      _origLaunchSolo();
    };

    // Override initSoloGame to apply pre-buff and use skin color
    const _origInitSoloGame = initSoloGame;
    initSoloGame = function() {
      _origInitSoloGame();
      // Apply skin color
      gameSnakes[0].color = getSnakeColor();
      // Apply pre-game buff after game starts
      if (soloPreBuff) {
        setTimeout(() => {
          applySoloPowerup(soloPreBuff.type);
          soloBuffs[soloPreBuff.type] = soloPreBuff.duration;
          syncSoloState();
          soloPreBuff = null;
        }, 3500); // after countdown finishes
      }
    };

    // Override backToLobby to show interstitial
    const _origBackToLobby = backToLobby;
    backToLobby = async function() {
      if (isSoloMode && soloScore > 20) {
        await AdManager.showInterstitial();
      }
      _origBackToLobby();
    };

    // Override showScreen to render shop and manage banners
    const _origShowScreen = showScreen;
    showScreen = function(id) {
      _origShowScreen(id);
      if (id === 'shopScreen') renderShop();
    };

    // Override syncSoloState to use skin color
    const _origSyncSoloState = syncSoloState;
    syncSoloState = function() {
      _origSyncSoloState();
      if (gameSnakes[0]) gameSnakes[0].color = getSnakeColor();
    };
  </script>
</body>
</html>
